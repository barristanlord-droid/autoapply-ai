name: Build iOS IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build static export
        working-directory: apps/web
        env:
          CAPACITOR_BUILD: '1'
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL || 'https://careerly-api.onrender.com/api/v1' }}
        run: npx next build

      - name: Sync Capacitor
        working-directory: apps/web
        run: npx cap sync ios

      - name: Resolve SPM dependencies
        working-directory: apps/web/ios/App
        run: xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App

      - name: Build iOS (unsigned)
        working-directory: apps/web/ios/App
        run: |
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath build/Careerly.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create unsigned IPA
        working-directory: apps/web/ios/App
        run: |
          mkdir -p build/Payload
          cp -r build/Careerly.xcarchive/Products/Applications/App.app build/Payload/
          cd build && zip -r Careerly-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: careerly-unsigned.ipa
          path: apps/web/ios/App/build/Careerly-unsigned.ipa

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/web/ios/App/build/Careerly-unsigned.ipa
