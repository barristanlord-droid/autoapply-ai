services:
  - type: web
    name: autoapply-api
    runtime: python
    region: oregon
    plan: free
    rootDir: apps/api
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./autoapply.db
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://autoapply-ai.vercel.app
      - key: DEBUG
        value: "false"
    healthCheckPath: /health
